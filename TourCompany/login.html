<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main>
        <section class="login">
            <div class="image">
                <div class="logo">
                    <img src="/img/travel-agency-logo-trip-logo-design-vector-illustration-2DAXK3E.jpg"
                     alt="Logo image" class="logo-img">
                    Tashkent Tour
                    <div class="text">"Simply all the countries 
                        that I want to go to travel around the world."
                    </div>
                    <div class="author">
                        <p class="author-name">Bekzod Muminjonov</p>
                        <p class="author-job">Director in Tashkent Tour</p>
                    </div>
                </div>
            </div>
            <div class="login-form">
                <h1 class="login-header">Welcome back Nucles</h1>
                <p class="login-text">
                    Login by using the form below by using your email and password
                </p>
                <form action="#">
                    <input type="email" class="form-item login" placeholder="Email" required>
                    <input type="password" class="form-item password" placeholder="Password" required>
                    <input type="submit" class="submit">
                </form>
                <a href="index.html" class="home-page">Return to main</a>
            </div>
        </section>
    </main>
</body>
</html>
