<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register page</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <main>
        <div class="icon">
            <img src="img/travel-agency-logo-trip-logo-design-vector-illustration-2DAXK3E.jpg" alt="Logo img" class="icon img">
            <p class="icon-text">Tashkent tour</p>
        </div>
        <div class="register-main">
            <div class="register">
                <h1 class="register-header">Create an account</h1>
                <p class="register-text">Join now and buy the tour packages around the world</p>
                <form action="#">
                    <input type="text" placeholder="Name" required>
                    <input type="image" placeholder="Photo" required>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required>
                    <input type="password" placeholder="Confirm password" required>
                    <input type="submit">
                </form>
                <p class="go-back"><a href="index.html" class="home-page">Go back</a></p>
            </div>
            <img src="img/Map-cropped.jpg" alt="#" class="map-img">
        </div>

    </main>
</body>
</html>
